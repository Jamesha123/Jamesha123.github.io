<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pong</title>
    <link rel="stylesheet" href="../../shared/games-shell.css" />
    <link rel="stylesheet" href="pong.css?v=3" />
  </head>
  <body>
    <div class="game-shell game-pong">
      <div id="pong-container" class="game-body">
        <header class="pong-scoreboard" aria-label="Scoreboard">
          <div class="pong-score-box pong-score-box--player">
            <span class="pong-score-label">You</span>
            <span class="pong-score-digit" id="pong-player-score">0</span>
          </div>
          <div class="pong-score-box pong-score-box--cpu">
            <span class="pong-score-label">CPU</span>
            <span class="pong-score-digit" id="pong-computer-score">0</span>
          </div>
        </header>

        <div class="pong-arena">
          <div class="game-playfield">
            <canvas id="pong-canvas"></canvas>
          </div>

          <div class="pong-paddle-slider-wrap" id="pong-paddle-slider-wrap" hidden>
            <span class="pong-slider-label">Paddle</span>
            <div
              class="pong-slider-track"
              id="pong-paddle-slider-track"
              role="slider"
              aria-label="Move paddle"
              aria-valuemin="0"
              aria-valuemax="1000"
              aria-valuenow="500"
              tabindex="0"
            >
              <div class="pong-slider-thumb" id="pong-paddle-slider-thumb" aria-hidden="true"></div>
            </div>
          </div>
        </div>

        <div class="pong-controls">
          <label>
            Difficulty
            <select id="pong-difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </label>
          <button type="button" class="pong-btn pong-btn-primary" id="pong-start-btn">Start</button>
          <button type="button" class="pong-btn" id="pong-reset-btn" disabled>Reset</button>
          <p id="pong-status" class="pong-message" hidden aria-live="polite"></p>
          <p class="pong-hint pong-hint-desktop"><kbd>W</kbd> / <kbd>S</kbd> or drag to move · first to 7 wins</p>
          <p class="pong-hint pong-hint-mobile">Use the slider to move · first to 7 wins</p>
        </div>
      </div>
    </div>
    <script src="../../shared/games-focus.js"></script>
    <script src="../../shared/world-achievement.js"></script>
    <script src="pong.js?v=20"></script>
  </body>
</html>
