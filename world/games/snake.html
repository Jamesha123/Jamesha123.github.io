<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="games-shell.css" />
    <link rel="stylesheet" href="snake.css" />
  </head>
  <body>
    <div class="game-shell game-snake">
      <div id="snake-container" class="game-body">
        <header class="snake-topbar">
          <div class="snake-score">
            <span>Score</span>
            <span class="snake-score-value" id="snake-score">0</span>
          </div>
          <p class="snake-controls-hint">
            <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
            <span class="snake-hint-sep">·</span>
            swipe to steer
            <span class="snake-hint-sep">·</span>
            tap center to restart
          </p>
        </header>
        <div class="game-playfield">
          <canvas id="snake-canvas"></canvas>
        </div>
      </div>
    </div>
    <script src="games-focus.js"></script>
    <script src="../../assets/js/snake.js?v=4"></script>
  </body>
</html>
