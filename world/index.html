<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>James Hang — Portfolio World (POC)</title>
    <meta
      name="description"
      content="Proof of concept: explore a pixel-art world to discover James Hang's projects and experience."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=147" />
    <script>
      (function () {
        var path = location.pathname;
        if (path.endsWith("/world")) {
          location.replace(path + "/" + location.search + location.hash);
          return;
        }

        function getWorldBaseUrl() {
          var currentPath = location.pathname;
          if (currentPath.endsWith(".html")) {
            return location.origin + currentPath.slice(0, currentPath.lastIndexOf("/") + 1);
          }
          if (!currentPath.endsWith("/")) {
            return location.origin + currentPath + "/";
          }
          return location.origin + currentPath;
        }

        window.__WORLD_ROOT__ = getWorldBaseUrl();
      })();
    </script>
  </head>
  <body>
    <div id="boot-overlay">
      <div id="boot-loading">
        <p id="boot-status">Loading world...</p>
        <div class="boot-progress-track" aria-hidden="true">
          <div id="boot-progress-bar" class="boot-progress-bar"></div>
        </div>
        <p id="boot-percent" class="boot-percent">0%</p>
      </div>

      <div id="title-screen" hidden>
        <img
          class="title-bg"
          src="assets/title/home.png"
          alt=""
        />
        <div class="title-overlay">
          <div class="title-brand">
            <h1 class="title-heading">James Hang</h1>
            <div class="title-subheading-row">
              <span class="title-subheading-line" aria-hidden="true"></span>
              <p class="title-subheading">Portfolio</p>
              <span class="title-subheading-line" aria-hidden="true"></span>
            </div>
          </div>
          <img
            class="title-sprite"
            src="assets/sprites/monkey-boy/boy_right_1.png"
            width="48"
            height="48"
            alt="Monkey Boy"
          />
          <div class="title-menu">
            <button type="button" id="title-play-btn" class="title-option">Play</button>
            <button type="button" id="title-classic-btn" class="title-option">Classic Portfolio</button>
            <p class="title-hint">No time? Check out the classic page.</p>
          </div>
        </div>
      </div>
    </div>

    <div id="ui-layer" class="pre-game-hidden">
      <div class="top-bar">
        <div class="top-bar-actions">
          <button
            type="button"
            id="achievement-log-btn"
            class="achievement-log-btn"
            aria-expanded="false"
            aria-controls="achievement-log-overlay"
          >
            Achievements<span class="achievement-log-btn__badge" id="achievement-log-badge" hidden>0</span>
          </button>
          <a href="../classic.html">Classic Portfolio</a>
          <button type="button" id="fullscreen-btn" aria-pressed="false">Fullscreen</button>
        </div>
      </div>
      <div id="bottom-hud" class="bottom-hud">
        <p id="interaction-hint" class="hint visible">WASD or click to move</p>
        <button type="button" id="mobile-interact-btn" class="mobile-interact-btn" hidden aria-label="Interact">Interact</button>
      </div>
    </div>

    <div id="virtual-joystick" class="pre-game-hidden" hidden aria-hidden="true">
      <div class="joystick-base"></div>
      <div class="joystick-stick"></div>
    </div>

    <div id="mobile-rotate-overlay" hidden aria-hidden="true">
      <div class="mobile-rotate-card">
        <p class="mobile-rotate-icon" aria-hidden="true">↻</p>
        <p class="mobile-rotate-title">Rotate your device</p>
        <p class="mobile-rotate-body">This world plays best in portrait mode.</p>
      </div>
    </div>

    <div id="achievement-log-overlay" class="achievement-log-overlay" aria-hidden="true">
      <div class="achievement-log-panel" role="dialog" aria-modal="true" aria-labelledby="achievement-log-title">
        <div class="achievement-log-head">
          <div>
            <h2 id="achievement-log-title">Achievement Log</h2>
            <p id="achievement-log-summary" class="achievement-log-summary">0 / 0 unlocked</p>
          </div>
          <button type="button" id="achievement-log-close" class="achievement-log-close" aria-label="Close (Esc)">×</button>
        </div>
        <ul id="achievement-log-list" class="achievement-log-list"></ul>
      </div>
    </div>

    <div id="achievement-toast" class="achievement-toast" hidden aria-live="polite"></div>

    <div id="modal-overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button type="button" id="modal-close" class="modal-close" aria-label="Close (Esc)">×</button>
        <div id="modal-standard">
          <h2 id="modal-title"></h2>
          <div id="modal-body-scroll" class="modal-body-scroll"></div>
          <div id="modal-hotspot-footer" class="modal-hotspot-footer">
            <div id="modal-links" class="modal-links"></div>
          </div>
        </div>
        <div id="modal-games-desktop" hidden></div>
        <div id="modal-app-view" hidden></div>
      </div>
    </div>

    <div id="map-fade" aria-hidden="true"></div>

    <div id="game-container" class="pre-game-hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js?v=147"></script>
    <script type="module" src="js/main.js?v=147"></script>
  </body>
</html>
